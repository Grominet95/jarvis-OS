<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jarvis — Wake Sequence (démo)</title>
<style>
  html, body { margin: 0; height: 100%; background: #04070e; overflow: hidden;
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", monospace; user-select: none; }
  #mount { position: fixed; inset: 0; }
  #logs { position: absolute; left: 28px; bottom: 24px; color: rgba(160,195,255,.55);
    font-size: 11px; letter-spacing: .18em; line-height: 1.9; text-transform: uppercase;
    transition: opacity .8s cubic-bezier(.32,.72,0,1); pointer-events: none; }
  #cursor { animation: blink 1s steps(1) infinite; }
  #logs div { animation: login .8s cubic-bezier(.32,.72,0,1) both; }
  @keyframes login { from { opacity: 0; transform: translateY(7px); filter: blur(4px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); } }
  #facewrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(.965); filter: blur(10px);
    transition: opacity .9s cubic-bezier(.32,.72,0,1), transform .9s cubic-bezier(.32,.72,0,1), filter .9s cubic-bezier(.32,.72,0,1); pointer-events: none; }
  #facewrap.on { opacity: 1; transform: scale(1); filter: blur(0); }
  #facebox { position: relative; --frame: rgba(110,200,255,.55); }
  #facecanvas { display: block; border-radius: 10px; box-shadow: 0 0 60px rgba(60,120,255,.18); }
  .corner { position: absolute; width: 26px; height: 26px; transition: border-color .4s ease; }
  .c-tl { top: -2px; left: -2px; border-top: 2px solid var(--frame); border-left: 2px solid var(--frame); }
  .c-tr { top: -2px; right: -2px; border-top: 2px solid var(--frame); border-right: 2px solid var(--frame); }
  .c-bl { bottom: -2px; left: -2px; border-bottom: 2px solid var(--frame); border-left: 2px solid var(--frame); }
  .c-br { bottom: -2px; right: -2px; border-bottom: 2px solid var(--frame); border-right: 2px solid var(--frame); }
  #facemsg { position: absolute; left: 0; right: 0; bottom: -36px; text-align: center;
    font-size: 10px; letter-spacing: .32em; color: var(--frame); transition: color .4s ease; white-space: nowrap; }
  #hud { position: absolute; top: 40px; right: 48px; text-align: right; opacity: 0;
    transform: translateY(18px) scale(.985); filter: blur(16px);
    transition: opacity 1.5s cubic-bezier(.32,.72,0,1) .25s, transform 1.5s cubic-bezier(.32,.72,0,1) .25s, filter 1.5s cubic-bezier(.32,.72,0,1) .25s;
    pointer-events: none; }
  #hud.on { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  #clock { font-size: clamp(48px, 7vw, 96px); font-weight: 700; color: #f2f7ff; line-height: 1;
    letter-spacing: .09em; transition: letter-spacing 1.8s cubic-bezier(.32,.72,0,1) .25s;
    text-shadow: 0 0 32px rgba(120,180,255,.45); }
  #hud.on #clock { letter-spacing: .02em; }
  #date { margin-top: 10px; font-size: 11px; letter-spacing: .32em; color: rgba(170,200,255,.6); }
  #status { margin-top: 18px; font-size: 10px; letter-spacing: .4em; color: rgba(110,230,255,.85);
    display: inline-flex; align-items: center; gap: 10px; }
  #dot { width: 6px; height: 6px; border-radius: 50%; background: #6de6ff;
    box-shadow: 0 0 10px #6de6ff; animation: pulse 2.4s ease-in-out infinite; }
  #skip { position: absolute; bottom: 24px; right: 28px; font-size: 9px; letter-spacing: .3em;
    color: rgba(140,170,220,.35); text-transform: uppercase; pointer-events: none;
    transition: opacity .8s cubic-bezier(.32,.72,0,1); }
  @keyframes blink { 0%,49% {opacity:1} 50%,100% {opacity:0} }
  @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:.35} }
</style>
</head>
<body>
<div id="mount"></div>
<div id="logs"><span id="cursor">▌</span></div>
<div id="facewrap">
  <div id="facebox">
    <canvas id="facecanvas" width="360" height="460"></canvas>
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>
    <div id="facemsg">INITIALISATION CAPTEUR…</div>
  </div>
</div>
<div id="hud">
  <div id="clock"></div>
  <div id="date"></div>
  <div id="status"><span id="dot"></span>SYSTÈMES EN LIGNE</div>
</div>
<div id="skip">cliquer pour passer</div>

<script>
window.addEventListener('error', function(e){
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:12px;left:12px;right:12px;z-index:9999;background:rgba(120,20,20,.92);color:#ffd7d7;font:12px ui-monospace,monospace;padding:12px 16px;border-radius:6px;white-space:pre-wrap';
  d.textContent = 'ERREUR : ' + e.message;
  document.body.appendChild(d);
});
</script>
